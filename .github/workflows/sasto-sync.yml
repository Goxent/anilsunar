name: Goxent Daily Intelligence Sync

on:
  schedule:
    - cron: '15 1 * * 1-5'   # 7:00 AM Nepal time, weekdays
  workflow_dispatch:
    inputs:
      sync_type:
        description: 'What to sync'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - nepse-only
          - notices-only

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Playwright (for NEPSE bot only)
        if: ${{ github.event.inputs.sync_type != 'notices-only' }}
        run: npx playwright install chromium --with-deps

      # ---- NEPSE DATA SYNC ----
      - name: Run NEPSE Crawler
        if: ${{ github.event.inputs.sync_type != 'notices-only' }}
        env:
          SASTO_EMAIL: ${{ secrets.SASTO_EMAIL }}
          SASTO_PASSWORD: ${{ secrets.SASTO_PASSWORD }}
        run: node scripts/omni-crawler.mjs
        timeout-minutes: 20

      - name: Run Technical Engine
        if: ${{ github.event.inputs.sync_type != 'notices-only' }}
        run: node scripts/technical-engine.mjs
        continue-on-error: true
        timeout-minutes: 3

      - name: Run Broker Tracker
        if: ${{ github.event.inputs.sync_type != 'notices-only' }}
        run: node scripts/broker-tracker.mjs
        continue-on-error: true
        timeout-minutes: 2

      # ---- NOTICE TRACKER ----
      - name: Run Notice Scraper
        if: ${{ github.event.inputs.sync_type != 'nepse-only' }}
        run: node scripts/notice-scraper.mjs
        timeout-minutes: 5

      - name: Run Notice AI Writer
        if: ${{ github.event.inputs.sync_type != 'nepse-only' }}
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: node scripts/notice-ai-writer.mjs
        continue-on-error: true
        timeout-minutes: 5

      # ---- AI ANALYST (3-stage Gemini pipeline) ----
      - name: Run AI Analyst
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node scripts/ai-digest.mjs
        continue-on-error: true
        timeout-minutes: 8

      # ---- EMAIL ALERTS ----
      - name: Send Notice Alert Email
        if: ${{ github.event.inputs.sync_type != 'nepse-only' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node scripts/notice-notifier.mjs
        continue-on-error: true
        timeout-minutes: 3
 
      # ---- CLOUD SYNC (Update Firestore) ----
      - name: Run Cloud Sync
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/sync-to-firestore.mjs
        continue-on-error: true
        timeout-minutes: 5

      # ---- COMMIT ALL DATA ----
      - name: Commit updated data
        run: |
          git config user.email "bot@anilsunar.com.np"
          git config user.name "Goxent Intelligence Bot"
          git add src/app/data/
          git add src/app/data/history/
          git add src/app/data/technical-signals.json
          git add src/app/data/broker-flow-5d.json
          git add src/app/data/deep_intelligence.json
          git diff --staged --quiet || git commit -m "chore: daily sync $(date -u +%Y-%m-%d) — NEPSE V2 + Notices"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        if: always()
        run: |
          echo "=== SYNC SUMMARY ==="
          node -e "
            const fs = require('fs')
            try {
              const n = JSON.parse(fs.readFileSync('src/app/data/notices.json','utf8'))
              console.log('Notices: ' + n.totalCount + ' total, ' + n.newCount + ' new')
            } catch(e) { console.log('Notices: data not available') }
            try {
              const m = JSON.parse(fs.readFileSync('src/app/data/market-omni-data.json','utf8'))
              console.log('NEPSE pages: ' + (m.scrapedPages || []).length)
            } catch(e) { console.log('NEPSE: data not available') }
          "
