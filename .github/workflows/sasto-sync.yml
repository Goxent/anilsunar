name: Automated Sasto Premium Sync

on:
  schedule:
    # Runs at 12:15 PM UTC (6:00 PM Nepal Time) Monday through Friday
    # Full end-of-day analysis after NEPSE market closes + data settles
    - cron: '15 12 * * 1-5'
  
  # Allows you to trigger the sync manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-premium-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Daily Sync (Sasto Bot + AI Digest + Cloud Sync)
        env:
          SASTO_EMAIL: ${{ secrets.SASTO_EMAIL }}
          SASTO_PASSWORD: ${{ secrets.SASTO_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.VITE_ANTHROPIC_API_KEY }}
          VITE_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || secrets.VITE_ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          NODE_ENV: production
        run: npm run daily-sync

      - name: Commit and Push Scraped Data
        run: |
          git config --global user.name "Goxent Bot"
          git config --global user.email "bot@anilsunar.com.np"
          git add src/app/data/*.json
          git status
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 [BOT] Daily Market Intelligence Update [$(date +'%Y-%m-%d')]" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
