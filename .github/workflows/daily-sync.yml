name: Goxent Master Intelligence Sync

on:
  schedule:
    - cron: '15 1 * * 1-5'   # 7:00 AM Nepal weekdays
  workflow_dispatch:
    inputs:
      pipeline:
        description: 'Which pipeline to run'
        required: false
        default: 'full'
        type: choice
        options: [full, nepse-only, news-only, content-only, ai-only]

jobs:
  master-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      # ─── NEPSE BOT (needs Playwright) ─────────────────
      - name: Install Playwright
        if: inputs.pipeline != 'news-only' && inputs.pipeline != 'content-only' && inputs.pipeline != 'ai-only'
        run: npx playwright install chromium --with-deps

      - name: NEPSE — Omni Crawler (Sasto Share)
        if: inputs.pipeline != 'news-only' && inputs.pipeline != 'content-only' && inputs.pipeline != 'ai-only'
        env:
          SASTO_EMAIL: ${{ secrets.SASTO_EMAIL }}
          SASTO_PASSWORD: ${{ secrets.SASTO_PASSWORD }}
        run: node scripts/omni-crawler.mjs
        continue-on-error: true
        timeout-minutes: 12

      # ─── DATA PROCESSING (pure code, no AI) ───────────
      - name: DATA — Technical Engine
        if: inputs.pipeline != 'news-only' && inputs.pipeline != 'content-only'
        run: node scripts/technical-engine.mjs
        continue-on-error: true
        timeout-minutes: 3

      - name: DATA — Broker Tracker
        if: inputs.pipeline != 'news-only' && inputs.pipeline != 'content-only'
        run: node scripts/broker-tracker.mjs
        continue-on-error: true
        timeout-minutes: 3

      # ─── NEWS SCRAPING ────────────────────────────────
      - name: NEWS — Nepal + Global Scraper
        if: inputs.pipeline != 'nepse-only' && inputs.pipeline != 'ai-only'
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: node scripts/nepal-news-scraper.mjs
        continue-on-error: true
        timeout-minutes: 5

      - name: NEWS — Regulatory Notices
        if: inputs.pipeline != 'nepse-only' && inputs.pipeline != 'ai-only'
        run: node scripts/notice-scraper.mjs
        continue-on-error: true
        timeout-minutes: 4

      # ─── AI ANALYSIS (Gemini + Claude supervisor) ────
      - name: AI — Market Analysis (Gemini → Claude)
        if: inputs.pipeline != 'news-only' && inputs.pipeline != 'content-only'
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ai-analyst-v2.mjs
        continue-on-error: true
        timeout-minutes: 6

      # ─── CONTENT GENERATION (Gemini research → Claude polish) ─
      - name: CONTENT — LinkedIn Pipeline
        if: inputs.pipeline != 'nepse-only' && inputs.pipeline != 'news-only'
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/linkedin-pipeline.mjs
        continue-on-error: true
        timeout-minutes: 5

      - name: CONTENT — Notice AI Posts
        if: inputs.pipeline != 'nepse-only'
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/notice-ai-writer.mjs
        continue-on-error: true
        timeout-minutes: 5

      - name: CONTENT — Daily Digest + Email
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node scripts/ai-digest.mjs
        continue-on-error: true
        timeout-minutes: 5

      # ─── COMMIT DATA ──────────────────────────────────
      - name: Commit all data
        run: |
          git config user.email "bot@anilsunar.com.np"
          git config user.name "Goxent Intelligence Bot"
          git add src/app/data/
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: master sync $(date -u '+%Y-%m-%d')"
            git push
          fi

      # ─── SUMMARY ─────────────────────────────────────
      - name: Print summary
        if: always()
        run: |
          node -e "
            const fs = require('fs')
            const files = [
              'src/app/data/market-omni-data.json',
              'src/app/data/technical-signals.json',
              'src/app/data/broker-flow-5d.json',
              'src/app/data/nepal-news.json',
              'src/app/data/deep_intelligence.json',
              'src/app/data/linkedin-content.json',
              'src/app/data/notices.json'
            ]
            console.log('=== SYNC SUMMARY ===')
            files.forEach(f => {
              try {
                const d = JSON.parse(fs.readFileSync(f,'utf8'))
                const name = f.split('/').pop()
                const info = d.supervisorActive ? ' [◆ Claude]' : d.generatedAt ? ' [✦ Gemini]' : ''
                console.log(name + info)
              } catch { console.log(f.split('/').pop() + ' — missing') }
            })
          "
